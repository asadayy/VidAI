services:
  # --- Ollama for AI Service ---
  ollama:
    image: ollama/ollama:latest
    container_name: vidai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
    networks:
      - vidai-network

  # --- Ollama Setup (Pull the model automatically) ---
  ollama-setup:
    image: curlimages/curl:latest
    container_name: vidai-ollama-setup
    depends_on:
      - ollama
    entrypoint: [ "sh", "-c", "sleep 10 && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2:3b\"}'" ]
    networks:
      - vidai-network

  # --- AI Microservice (Python/FastAPI) ---
  ai-service:
    build: ./ai-service
    container_name: vidai-ai-service
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - DEBUG=true
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5000,http://localhost:80,http://localhost,http://localhost:3000
    depends_on:
      - ollama
    networks:
      - vidai-network
    # Hot reload command
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- Backend Server (Node.js/Express) ---
  backend:
    build: ./server
    container_name: vidai-backend
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules # Prevents local node_modules from overwriting container's
    # This automatically loads all keys from your existing server/.env file
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - PORT=5000
      - AI_SERVICE_URL=http://ai-service:8000
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - ai-service
    networks:
      - vidai-network
    # Hot reload command
    command: npm run dev

  # --- Frontend (React/Vite) ---
  frontend:
    build:
      context: .
      args:
        - VITE_API_URL=http://localhost:5000/api/v1
        - VITE_AI_API_URL=http://localhost:8000
    container_name: vidai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - vidai-network

networks:
  vidai-network:
    driver: bridge

volumes:
  ollama_data:
